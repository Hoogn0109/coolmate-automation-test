image: mcr.microsoft.com/playwright:v1.57.0-jammy

stages:
  - test
  - upload
  - report

before_script:
  - npm ci

ui_tests:
  stage: test
  script:
    - npx playwright test --workers=4 || true
    - >
      BUILD_TIME=$(TZ='Asia/Ho_Chi_Minh' date +'%d/%m %H:%M') &&
      echo "{
        \"name\": \"GitLab CI\",
        \"type\": \"gitlab\",
        \"buildName\": \"#${CI_PIPELINE_IID} - ${BUILD_TIME}\",
        \"buildOrder\": \"$CI_PIPELINE_IID\",
        \"buildUrl\": \"$CI_PIPELINE_URL\",
        \"reportUrl\": \"http://10.0.76.40:8080\"
      }" > allure-results/executor.json
  allow_failure: true
  artifacts:
    when: always
    paths:
      - allure-results/
    expire_in: 7 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "cicd"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  tags:
    - docker

upload_allure_results:
  stage: upload
  image: alpine:latest
  dependencies:
    - ui_tests
  before_script:
    - apk add --no-cache openssh rsync
    - mkdir -p ~/.ssh
    - cp "$SSH_KEY_FILE" ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts
  script:
    - ssh -i ~/.ssh/id_rsa $SERVER_USER@$SERVER_IP "rm -rf $SERVER_PATH/allure-results && mkdir -p $SERVER_PATH/allure-results"
    - rsync -avz allure-results/ $SERVER_USER@$SERVER_IP:$SERVER_PATH/allure-results/
  rules:
    - if: '$CI_COMMIT_BRANCH == "cicd"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  tags:
    - docker

# Allure v2 Report — port 8080
generate_allure_v2_report:
  stage: report
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh
    - mkdir -p ~/.ssh
    - cp "$SSH_KEY_FILE" ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts
  script:
    - ssh $SERVER_USER@$SERVER_IP "cd /home/ntq/playwright-tests/allure && if [ -d allure-report/history ]; then cp -r allure-report/history allure-results/history; fi"
    - ssh $SERVER_USER@$SERVER_IP "cd /home/ntq/playwright-tests/allure && docker run --rm -v \$(pwd)/allure-results:/work/allure-results -v \$(pwd)/allure-report:/work/allure-report -w /work frankescobar/allure-docker-service allure generate allure-results -o allure-report --clean"
    - ssh $SERVER_USER@$SERVER_IP "sudo rm -rf /var/www/allure-report/* && sudo cp -r /home/ntq/playwright-tests/allure/allure-report/* /var/www/allure-report/ && sudo chown -R www-data:www-data /var/www/allure-report && sudo chmod -R 755 /var/www/allure-report"
  rules:
    - if: '$CI_COMMIT_BRANCH == "cicd"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  tags:
    - docker

# Allure v3 Report — port 8081
generate_allure_v3_report:
  stage: report
  image: node:20-alpine
  dependencies:
    - ui_tests
  before_script:
    - apk add --no-cache openssh rsync
    - mkdir -p ~/.ssh
    - cp "$SSH_KEY_FILE" ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts
    - npm ci
  script:
    - mkdir -p allure-history
    - scp $SERVER_USER@$SERVER_IP:/home/ntq/playwright-tests/allure/allure-history/history.jsonl ./allure-history/history.jsonl || echo "No previous history"
    - npx allure generate ./allure-results -c ./allurerc.mjs -o ./allure-report-v3
    - ssh $SERVER_USER@$SERVER_IP "mkdir -p /home/ntq/playwright-tests/allure/allure-history && sudo chown -R $SERVER_USER /home/ntq/playwright-tests/allure/allure-history"
    - scp ./allure-history/history.jsonl $SERVER_USER@$SERVER_IP:/home/ntq/playwright-tests/allure/allure-history/history.jsonl
    - rsync -avz --delete ./allure-report-v3/ $SERVER_USER@$SERVER_IP:/home/ntq/playwright-tests/allure/allure-report-v3/
    - ssh $SERVER_USER@$SERVER_IP "sudo mkdir -p /var/www/allure-report-v3 && sudo rm -rf /var/www/allure-report-v3/* && sudo cp -r /home/ntq/playwright-tests/allure/allure-report-v3/* /var/www/allure-report-v3/ && sudo chown -R www-data:www-data /var/www/allure-report-v3 && sudo chmod -R 755 /var/www/allure-report-v3"
  rules:
    - if: '$CI_COMMIT_BRANCH == "cicd"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  tags:
    - docker
