name: Playwright Allure Report

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        id: playwright
        shell: bash
        run: |
          rm -rf allure-results test-results
          mkdir -p allure-results

          set +e
          npx playwright test --workers=4
          TEST_EXIT_CODE=$?
          set -e

          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BUILD_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          REPORT_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}/"

          cat > allure-results/executor.json <<EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "buildName": "#${GITHUB_RUN_NUMBER} - ${GITHUB_REF_NAME}",
            "buildOrder": "${GITHUB_RUN_NUMBER}",
            "buildUrl": "${BUILD_URL}",
            "reportUrl": "${REPORT_URL}"
          }
          EOF

          echo "$TEST_EXIT_CODE" > allure-results/test-exit-code.txt
          echo "exit_code=$TEST_EXIT_CODE" >> "$GITHUB_OUTPUT"

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30
          if-no-files-found: error

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 30
          if-no-files-found: ignore

      - name: Fail when Playwright tests failed
        if: steps.playwright.outputs.exit_code != '0'
        run: exit ${{ steps.playwright.outputs.exit_code }}

  allure-report:
    needs: test
    if: always()
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Restore Allure history
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          git fetch origin gh-pages --depth=1 || true

          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git checkout origin/gh-pages -- history || true
          fi

          if [ -d history ]; then
            rm -rf allure-results/history
            cp -R history allure-results/history
            rm -rf history
          fi

      - name: Generate Allure report
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30
          if-no-files-found: error

      - name: Publish Allure report to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd allure-report
          touch .nojekyll

          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b gh-pages
          git add .
          git commit -m "Deploy Allure report"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
