name: Playwright Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  BASE_URL: https://www.coolmate.me/
  TEST_ENV: github
  PREFIX: ''
  USER_NAME: ${{ secrets.USER_NAME }}
  PASS_WORD: ${{ secrets.PASS_WORD }}
  PHONE_NUMBER: ${{ secrets.PHONE_NUMBER }}
  PDP_URL_1: https://www.coolmate.me/product/ao-in-cs-em-uoc-mo-tram-phong-tuong-lai-s2?color=trang
  PDP_URL_2: https://www.coolmate.me/product/polo-pique-basic-cotton-100?color=xam-castlerock
  PDP_URL: https://coolmate.me/product/ao-tshirt-cotton-compact-world-cup-doi-tuyen-han?color=trang
  PDP_URL_PAYMENT: https://www.coolmate.me/product/combo-2-ao-thun-nam-chay-bo-graphic-dot?color=mix-mau-1
  PDP_URL_3: https://www.coolmate.me/product/quan-dai-nam-daily-pants?color=den
  PDP_URL_DISCOUNT: https://www.coolmate.me/product/ao-khoac-the-thao-track-jacket-essential?color=xam-bid-grey

jobs:
  test:
    timeout-minutes: 70
    runs-on: [self-hosted, Windows]
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install chromium

    - name: Check required env
      run: |
        node -e "const required=['BASE_URL','USER_NAME','PASS_WORD','PHONE_NUMBER','PDP_URL','PDP_URL_PAYMENT']; const missing=required.filter((name)=>!process.env[name]); for (const name of required) console.log((missing.includes(name) ? 'Missing required env' : 'Configured env') + ': ' + name); if (missing.length) process.exit(1);"

    - name: Run Playwright tests
      run: npm run test:ci

    - name: Write Allure executor metadata
      if: always()
      run: |
        node -e "const fs=require('fs'); const runNumber=Number('${{ github.run_number }}'); const runAttempt=Number('${{ github.run_attempt }}'); const buildName='#'+runNumber+'.'+runAttempt; fs.mkdirSync('allure-results',{recursive:true}); fs.writeFileSync('allure-results/executor.json', JSON.stringify({name:'GitHub Actions',type:'github',buildName,buildOrder:(runNumber*1000)+runAttempt,buildUrl:'${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}',reportName:'Allure Report '+buildName,reportUrl:'${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'}, null, 2));"

    - name: Download previous Allure history
      if: always()
      shell: powershell
      run: |
        $historyUrl = "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/history"
        $historyPath = "allure-results/history"
        New-Item -ItemType Directory -Force $historyPath | Out-Null
        $files = @("history.json", "history-trend.json", "duration-trend.json", "retry-trend.json", "categories-trend.json")
        foreach ($file in $files) {
          try {
            Invoke-WebRequest -Uri "$historyUrl/$file" -OutFile "$historyPath/$file" -UseBasicParsing
            Write-Host "Downloaded previous Allure history: $file"
          } catch {
            Write-Host "No previous Allure history file: $file"
          }
        }

    - name: Generate Allure Report
      if: always()
      run: npx allure generate allure-results -o allure-report --clean

    - name: Upload Allure Report artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: allure-report
        path: allure-report/
        retention-days: 30

    - name: Upload Playwright Report artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

  # Deploy Allure Report to GitHub Pages
  deploy-report:
    if: always() && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Download Allure Report
      uses: actions/download-artifact@v4
      with:
        name: allure-report
        path: allure-report

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload to Pages
      uses: actions/upload-pages-artifact@v3
      with:
        name: github-pages-${{ github.run_attempt }}
        path: allure-report

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
      with:
        artifact_name: github-pages-${{ github.run_attempt }}